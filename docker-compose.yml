# ─────────────────────────────────────────────────────────────
#  TaskFlow — docker-compose (local development)
#  Usage:
#    docker compose up -d          # start postgres + app
#    docker compose logs -f app    # follow app logs
#    docker compose down -v        # stop and remove volumes
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── App ───────────────────────────────────────────────────────
  app:
    build: .
    container_name: taskflow_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/taskflow
      JWT_SECRET: dev_secret_change_me
    ports:
      - "3000:3000"
    volumes:
      # Mount source for live reload in dev (comment out for prod-like test)
      - ./src:/app/src
      - ./public:/app/public

volumes:
  pgdata:
